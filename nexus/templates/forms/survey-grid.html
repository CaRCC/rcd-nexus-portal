{% load nexus_extras %}
<section class="fields">
    {% for field in form %}
    <div class="field-head {% cycle 'odd-field' 'even-field' as fieldcycle %} {% if field.errors %}error-field{% endif %}">
        <p class="question">Question {{forloop.counter}}: {{ field.label_tag }}</p>
        <p class="help">{{ field.help_text }}</p>
        {{ field.errors }}
    </div>
    <div class="field-body {{ fieldcycle }}">
        {%if field == form.nps %}
            {% for radio in form.nps %}
            <div class="radiogrp">
                {{radio.tag}}
                <label for="{{ radio.id_for_label }}">{{ radio.choice_label|nps_br }}</label>
            </div>
            {%endfor%}
        {%else%}
            <p class="field">{{ field }}</p>
        {%endif%}
    </div>
    {% endfor %}
</section>
